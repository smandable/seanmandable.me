name: Deploy to Dreamhost

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DREAMHOST_SSH_KEY }}

      - name: Trust Dreamhost host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DREAMHOST_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync dist/ to Dreamhost
        run: |
          rsync -avz --delete \
            dist/ \
            "${{ secrets.DREAMHOST_SSH_USER }}@${{ secrets.DREAMHOST_SSH_HOST }}:${{ secrets.DREAMHOST_DEPLOY_PATH }}/"
